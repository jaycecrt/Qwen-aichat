services:
  - type: web
    name: ai-chat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        sync: false
      - key: QWEN_MODEL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString

databases:
  - name: chat-db
    plan: free
